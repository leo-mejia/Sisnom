# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sisnom?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:SisnomSecretKey2024SuperSeguraParaJWT256BitsMinimo!!Cambiar}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Servidor (sin context-path para simplificar)
server.port=${PORT:8080}

# Client URL for CORS
client.url=${CLIENT_URL:http://localhost:5173}
